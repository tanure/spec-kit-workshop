name: Build and Deploy eBook

on:
  push:
    branches: ["main"]

  # Allows manual trigger from the Actions tab
  workflow_dispatch:

# Sets permissions for GITHUB_TOKEN to allow Pages deployment and pushing to gh-pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy to GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute dynamic version and build datetime
        id: version
        run: |
          # Base version + commit count => bumps on every commit
          BASE_VERSION="2.0"
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="v${BASE_VERSION}.${COMMIT_COUNT}"
          BUILD_DATETIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "datetime=${BUILD_DATETIME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Inject version and build datetime into the eBook
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_DATETIME="${{ steps.version.outputs.datetime }}"
          # Update the highlighted version tag next to the hero badge
          sed -i -E "s|(<span class=\"ver-num\" id=\"ebook-version\">)[^<]*(</span>)|\1${VERSION}\2|" index.html
          sed -i -E "s|(<span class=\"ver-date\" id=\"last-updated\">)[^<]*(</span>)|\1${BUILD_DATETIME}\2|" index.html

      - name: Update README version tag and commit
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_DATETIME="${{ steps.version.outputs.datetime }}"
          # Replace everything after the marker on the version line
          sed -i -E "s|(<!-- ebook-version -->).*|\1 [![eBook Version](https://img.shields.io/badge/eBook_Version-${VERSION}-3FB950?style=for-the-badge)](https://tanure.github.io/spec-kit-workshop/) _Updated: ${BUILD_DATETIME}_|" README.md
          if git diff --quiet README.md; then
            echo "README already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: update eBook version tag to ${VERSION} [skip ci]"
            # Pushing with GITHUB_TOKEN does not retrigger workflows (no loop)
            git push origin main
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
